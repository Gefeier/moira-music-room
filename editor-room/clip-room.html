<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>丽丽的剪辑室</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse at top, #1f1508 0%, #140a05 50%, #080402 100%);
  color: rgba(255,240,220,0.9); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  min-height: 100vh; overflow-x: hidden;
}
#title {
  position: fixed; top: 18px; left: 24px;
  font-size: 14px; color: rgba(255,210,160,0.92); letter-spacing: 2px; z-index: 10;
}
#title .sub { color: rgba(255,255,255,0.4); font-size: 11px; margin-left: 10px; }
#title .badge {
  display: inline-block; margin-left: 10px; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; color: rgba(255,112,0,0.85); border: 1px solid rgba(255,112,0,0.35);
}
#back-link {
  position: fixed; top: 18px; right: 24px; z-index: 10;
  color: rgba(255,200,150,0.55); font-size: 12px; text-decoration: none;
  border: 1px solid rgba(255,200,150,0.22); padding: 4px 12px; border-radius: 12px;
}
#back-link:hover { color: #fff; border-color: rgba(255,220,180,0.7); }

#room {
  max-width: 1320px; margin: 60px auto 24px; padding: 0 20px;
  display: grid; grid-template-columns: 260px 1fr 280px; gap: 14px; min-height: calc(100vh - 140px);
}
.panel {
  background: rgba(28,20,12,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,180,100,0.13);
  border-radius: 14px; padding: 16px;
  display: flex; flex-direction: column;
}
.panel h2 {
  margin: 0 0 8px; font-size: 12px; font-weight: 500;
  color: rgba(255,210,160,0.88); letter-spacing: 1.4px;
}
.panel .hint { font-size: 11px; color: rgba(255,230,200,0.4); margin-bottom: 10px; line-height: 1.6; }

/* 素材库 */
#scan-btn {
  background: transparent; border: 1px solid rgba(255,150,60,0.35);
  color: rgba(255,210,160,0.9); font-size: 11px; padding: 5px 10px; border-radius: 7px; cursor: pointer;
  margin-bottom: 10px;
}
#scan-btn:hover { background: rgba(255,150,60,0.1); }
#asset-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.asset {
  background: rgba(255,220,180,0.04); border: 1px solid rgba(255,180,100,0.08);
  border-radius: 8px; padding: 8px 10px; font-size: 11px; cursor: grab; user-select: none;
  transition: all 0.15s;
}
.asset:hover { border-color: rgba(255,180,100,0.4); background: rgba(255,180,100,0.08); }
.asset .name { color: rgba(255,230,200,0.88); word-break: break-all; }
.asset .meta { color: rgba(255,230,200,0.4); font-size: 10px; margin-top: 3px; }

/* 时间轴 + 预览 */
#stage { display: flex; flex-direction: column; gap: 14px; }
#preview {
  background: #000; border-radius: 10px; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,200,150,0.3); font-size: 12px; letter-spacing: 2px;
  position: relative; overflow: hidden;
}
#preview-video { width: 100%; height: 100%; object-fit: contain; display: none; }
#preview.has-video #preview-placeholder { display: none; }
#preview.has-video #preview-video { display: block; }

#timeline-wrap { background: rgba(28,20,12,0.55); border: 1px solid rgba(255,180,100,0.13);
  border-radius: 12px; padding: 14px; }
.track {
  display: grid; grid-template-columns: 60px 1fr; gap: 10px; margin-bottom: 8px; align-items: center;
}
.track .label { font-size: 10px; color: rgba(255,210,160,0.55); letter-spacing: 1.2px; text-transform: uppercase; }
.track .lane {
  height: 36px; background: rgba(255,220,180,0.03);
  border: 1px dashed rgba(255,180,100,0.18); border-radius: 6px;
  position: relative; overflow: hidden;
}
.track.video-track .lane { height: 48px; }
.track .lane .clip {
  position: absolute; top: 4px; bottom: 4px;
  background: linear-gradient(90deg, rgba(255,112,0,0.35), rgba(255,80,0,0.5));
  border: 1px solid rgba(255,150,60,0.5); border-radius: 4px;
  font-size: 10px; color: #fff; padding: 0 6px; line-height: 28px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.track .lane .sticker {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#ruler {
  display: grid; grid-template-columns: 60px 1fr; gap: 10px;
  font-size: 9px; color: rgba(255,210,160,0.4); margin-bottom: 6px;
}
#ruler .ticks { position: relative; height: 14px; border-bottom: 1px solid rgba(255,180,100,0.12); }
#ruler .ticks span { position: absolute; top: 0; transform: translateX(-50%); }

/* 气泡库 */
#bubble-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bubble {
  background: rgba(255,220,180,0.04); border: 1px solid rgba(255,180,100,0.12);
  border-radius: 10px; padding: 12px 8px; text-align: center;
  cursor: grab; transition: all 0.15s; user-select: none;
}
.bubble:hover { border-color: rgba(255,180,100,0.5); background: rgba(255,180,100,0.08); transform: translateY(-2px); }
.bubble svg { width: 36px; height: 36px; }
.bubble .bname { font-size: 10px; color: rgba(255,230,200,0.8); margin-top: 6px; letter-spacing: 1px; }
.bubble .bsub { font-size: 9px; color: rgba(255,230,200,0.4); margin-top: 1px; }

/* 底部 */
#dock {
  max-width: 1320px; margin: 0 auto 18px; padding: 0 20px;
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
#dock .status { font-size: 11px; color: rgba(255,230,200,0.45); }
.primary-btn {
  background: rgba(255,112,0,0.18); border: 1px solid rgba(255,112,0,0.55);
  color: rgba(255,220,180,0.95); font-size: 12px; padding: 8px 18px; border-radius: 10px;
  cursor: pointer; letter-spacing: 1.2px;
}
.primary-btn:hover { background: rgba(255,112,0,0.32); }
.primary-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* 小浮层 */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(40,25,10,0.92); border: 1px solid rgba(255,180,100,0.3);
  color: rgba(255,230,200,0.92); padding: 10px 18px; border-radius: 10px;
  font-size: 12px; letter-spacing: 0.5px; opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="title">
  lili's editor room
  <span class="sub">剪辑室 · 素材 → 时间轴 → 墨的气泡 → 剪映草稿</span>
  <span class="badge">v0.1 骨架</span>
</div>
<a id="back-link" href="music_neural.html">← 打歌台</a>

<div id="room">
  <!-- 左栏：素材库 -->
  <div class="panel">
    <h2>素材库</h2>
    <button id="scan-btn">↻ 扫描 ~/Movies</button>
    <div class="hint">扫到的视频拖到中间时间轴的视频轨</div>
    <div id="asset-list">
      <div class="asset" style="opacity:0.5"><div class="name">点"扫描"加载本地4K60素材</div><div class="meta">后端 localhost:9898</div></div>
    </div>
  </div>

  <!-- 中栏：预览+时间轴 -->
  <div id="stage">
    <div id="preview">
      <span id="preview-placeholder">预览区 · 拖素材上来</span>
      <video id="preview-video" controls></video>
    </div>
    <div id="timeline-wrap">
      <div id="ruler"><span></span><div class="ticks" id="ticks"></div></div>
      <div class="track video-track"><span class="label">视频</span><div class="lane" id="lane-video"></div></div>
      <div class="track"><span class="label">气泡</span><div class="lane" id="lane-sticker"></div></div>
      <div class="track"><span class="label">音效</span><div class="lane" id="lane-sound"></div></div>
    </div>
  </div>

  <!-- 右栏：墨的气泡库 -->
  <div class="panel">
    <h2>墨的气泡库</h2>
    <div class="hint">点一下落到当前时间点</div>
    <div id="bubble-grid">
      <div class="bubble" data-bubble="water" data-sound="drop">
        <svg viewBox="0 0 40 40"><circle cx="20" cy="22" r="14" fill="none" stroke="#9fdcff" stroke-width="2" opacity="0.85"/><circle cx="20" cy="22" r="9" fill="none" stroke="#9fdcff" stroke-width="1" opacity="0.5"/><ellipse cx="15" cy="17" rx="3" ry="2" fill="#fff" opacity="0.6"/></svg>
        <div class="bname">水泡</div><div class="bsub">drop.wav</div>
      </div>
      <div class="bubble" data-bubble="ink" data-sound="spread">
        <svg viewBox="0 0 40 40"><defs><radialGradient id="g1"><stop offset="0" stop-color="#ff9040"/><stop offset="0.6" stop-color="#ff5a00"/><stop offset="1" stop-color="#3a1a05" stop-opacity="0"/></radialGradient></defs><circle cx="20" cy="20" r="16" fill="url(#g1)"/><circle cx="20" cy="20" r="6" fill="#2a1505"/></svg>
        <div class="bname">墨色扩散</div><div class="bsub">spread.wav</div>
      </div>
      <div class="bubble" data-bubble="stars" data-sound="chime">
        <svg viewBox="0 0 40 40"><g fill="#ffe0a0"><polygon points="20,8 22,14 28,14 23,18 25,24 20,20 15,24 17,18 12,14 18,14"/><circle cx="10" cy="28" r="1.5"/><circle cx="30" cy="26" r="1.2"/><circle cx="14" cy="34" r="1"/><circle cx="26" cy="33" r="1.3"/></g></svg>
        <div class="bname">碎星</div><div class="bsub">chime.wav</div>
      </div>
      <div class="bubble" style="opacity:0.35;cursor:default">
        <svg viewBox="0 0 40 40"><rect x="8" y="8" width="24" height="24" rx="6" fill="none" stroke="rgba(255,220,180,0.3)" stroke-dasharray="3 3"/></svg>
        <div class="bname">+ 自定义</div><div class="bsub">待开发</div>
      </div>
    </div>
  </div>
</div>

<div id="dock">
  <div class="status" id="status">Ready · 后端未启动，点扫描会提示</div>
  <button class="primary-btn" id="export-btn" disabled>导出到剪映（研发中）</button>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:9898';
const state = { clip: null, stickers: [], duration: 60 };

// 时间轴刻度
function drawRuler() {
  const ticks = document.getElementById('ticks');
  ticks.innerHTML = '';
  for (let s = 0; s <= state.duration; s += 5) {
    const el = document.createElement('span');
    el.textContent = s + 's';
    el.style.left = (s / state.duration * 100) + '%';
    ticks.appendChild(el);
  }
}
drawRuler();

// toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// 扫描素材
document.getElementById('scan-btn').onclick = async () => {
  try {
    const res = await fetch(API + '/api/scan');
    const data = await res.json();
    const list = document.getElementById('asset-list');
    list.innerHTML = '';
    if (!data.items || data.items.length === 0) {
      list.innerHTML = '<div class="asset" style="opacity:0.5"><div class="name">~/Movies 下没有mp4/mov</div></div>';
      return;
    }
    data.items.forEach(it => {
      const div = document.createElement('div');
      div.className = 'asset';
      div.innerHTML = `<div class="name">${it.name}</div><div class="meta">${(it.size/1024/1024).toFixed(1)}MB · ${it.mtime || ''}</div>`;
      div.onclick = () => loadClip(it);
      list.appendChild(div);
    });
    document.getElementById('status').textContent = `扫到 ${data.items.length} 个视频 · 点一个加到时间轴`;
  } catch (e) {
    toast('后端没启动：cd 到工坊目录 python3 editor_room_server.py');
    document.getElementById('status').textContent = '后端未连接 · 端口9898';
  }
};

function loadClip(it) {
  state.clip = it;
  const lane = document.getElementById('lane-video');
  lane.innerHTML = `<div class="clip" style="left:0;width:100%">${it.name}</div>`;
  const v = document.getElementById('preview-video');
  v.src = API + '/api/file?path=' + encodeURIComponent(it.path);
  document.getElementById('preview').classList.add('has-video');
  document.getElementById('status').textContent = `已加载: ${it.name}`;
  // 拿到视频duration后重绘刻度
  v.onloadedmetadata = () => {
    state.duration = Math.max(10, Math.round(v.duration));
    drawRuler();
    // 重绘已有贴纸
    renderStickers();
  };
}

// 气泡点击 → 落到当前时间
document.querySelectorAll('.bubble[data-bubble]').forEach(b => {
  b.onclick = () => {
    if (!state.clip) { toast('先加载一段视频'); return; }
    const v = document.getElementById('preview-video');
    const t = v.currentTime || 0;
    state.stickers.push({ type: b.dataset.bubble, sound: b.dataset.sound, t, svg: b.querySelector('svg').outerHTML });
    renderStickers();
    toast(`${b.querySelector('.bname').textContent} 落在 ${t.toFixed(1)}s`);
  };
});

function renderStickers() {
  const sl = document.getElementById('lane-sticker');
  const al = document.getElementById('lane-sound');
  sl.innerHTML = ''; al.innerHTML = '';
  state.stickers.forEach((s, i) => {
    const pct = (s.t / state.duration * 100);
    const sv = document.createElement('div');
    sv.className = 'sticker'; sv.style.left = pct + '%'; sv.innerHTML = s.svg;
    sv.onclick = () => { state.stickers.splice(i, 1); renderStickers(); };
    sv.title = `${s.type} @ ${s.t.toFixed(1)}s · 点击移除`;
    sl.appendChild(sv);
    const av = document.createElement('div');
    av.className = 'sticker'; av.style.left = pct + '%';
    av.innerHTML = '<div style="width:6px;height:14px;background:rgba(255,180,100,0.6);border-radius:2px"></div>';
    av.title = s.sound;
    al.appendChild(av);
  });
}

// 导出按钮占位
document.getElementById('export-btn').onclick = () => {
  toast('剪映草稿生成器还在研发中，下一步就做');
};
</script>
</body>
</html>
